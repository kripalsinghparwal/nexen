<!DOCTYPE html>
<html>
<head>
<title>Request Food</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
<div class="card p-4 shadow">
<h3>Request Food</h3>

<form method="POST">
<input class="form-control mb-3" name="name" placeholder="Name" required>
<input class="form-control mb-3" name="organization" placeholder="Organization">
<input class="form-control mb-3" type="number" name="quantity" placeholder="Quantity" required>
<input class="form-control mb-3" name="address" placeholder="Address" required>
<input class="form-control mb-3" name="phone" placeholder="Phone" required>

<button class="btn btn-success">Submit</button>
</form>

</div>
</div>

</body>
</html>
