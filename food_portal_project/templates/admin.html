<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

<h2 class="mb-4">Admin Dashboard</h2>

<h4>Donations</h4>
<table class="table table-bordered table-striped">
<tr>
<th>ID</th><th>Name</th><th>Food</th><th>Qty</th><th>Address</th><th>Phone</th>
</tr>

{% for d in donations %}
<tr>
<td>{{ d[0] }}</td>
<td>{{ d[1] }}</td>
<td>{{ d[2] }}</td>
<td>{{ d[3] }}</td>
<td>{{ d[4] }}</td>
<td>{{ d[5] }}</td>
</tr>
{% endfor %}
</table>

<h4>Requests</h4>
<table class="table table-bordered table-striped">
<tr>
<th>ID</th><th>Name</th><th>Org</th><th>Qty</th><th>Address</th><th>Phone</th>
</tr>

{% for r in requests %}
<tr>
<td>{{ r[0] }}</td>
<td>{{ r[1] }}</td>
<td>{{ r[2] }}</td>
<td>{{ r[3] }}</td>
<td>{{ r[4] }}</td>
<td>{{ r[5] }}</td>
</tr>
{% endfor %}
</table>

</div>

</body>
</html>
